name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate deployment variables
        env:
          API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          CONFIGURED_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "Missing repository variable VITE_API_BASE_URL (for example: https://your-service.onrender.com)."
            exit 1
          fi

          if [ -n "$CONFIGURED_BASE_PATH" ]; then
            BASE_PATH="$CONFIGURED_BASE_PATH"
          else
            BASE_PATH="/${GITHUB_REPOSITORY#*/}/"
          fi

          echo "VITE_API_BASE_URL=$API_BASE_URL" >> "$GITHUB_ENV"
          echo "VITE_BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
